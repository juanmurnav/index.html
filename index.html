<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exámenes Juan</title>
    <style>
        :root {
            --primary: #2563eb;
            --background: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: var(--primary);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Exámenes Juan</h1>
        <p>Selecciona el test que deseas realizar:</p>
    </header>

    <main class="grid">
        <!-- Tarjeta de Test 1 -->
        <div class="card">
            <h3>Test de Historia</h3>
            <p>Preguntas sobre la Edad Media y Moderna.</p>
            <a href="tests/historia.html" class="btn">Iniciar Test</a>
        </div>

        <!-- Tarjeta de Test 2 -->
        <div class="card">
            <h3>Test de Matemáticas</h3>
            <p>Cálculo, álgebra y geometría básica.</p>
            <a href="tests/matematicas.html" class="btn">Iniciar Test</a>
        </div>

        <!-- Tarjeta de Test 3 -->
        <div class="card">
            <h3>Test de Ciencia</h3>
            <p>Preguntas generales de biología y física.</p>
            <a href="tests/ciencia.html" class="btn">Iniciar Test</a>
        </div>
    </main>

</body>
</html>
